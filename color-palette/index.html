<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palette Rotator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #181818;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #666;
    --accent: #fff;
    --transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow-x: hidden;
  }

  /* Background grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 820px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 3rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .palette-name {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: right;
  }

  .palette-name span {
    display: block;
    font-size: 1rem;
    color: var(--text);
    letter-spacing: 0.05em;
    margin-top: 0.25rem;
    font-weight: 500;
    transition: all var(--transition);
  }

  /* Swatches */
  .swatches {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0;
    border-radius: 12px;
    overflow: hidden;
    height: 340px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    position: relative;
  }

  .swatch {
    position: relative;
    cursor: pointer;
    transition: flex var(--transition), background-color var(--transition);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    overflow: hidden;
  }

  .swatch:hover {
    flex: 1.6;
  }

  .swatch::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .swatch:hover::after {
    opacity: 1;
  }

  .swatch-info {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 1rem 0.75rem;
    z-index: 2;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .swatch:hover .swatch-info {
    transform: translateY(0);
  }

  .swatch-hex {
    font-size: 0.78rem;
    font-weight: 500;
    color: #fff;
    letter-spacing: 0.06em;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    display: block;
    margin-bottom: 2px;
  }

  .swatch-rgb {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.75);
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    display: none;
  }

  /* Toggle */
  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 2rem;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .toggle-group {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .toggle {
    position: relative;
    width: 44px;
    height: 24px;
    cursor: pointer;
  }

  .toggle input { display: none; }

  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 999px;
    transition: background 0.3s;
  }

  .toggle input:checked ~ .toggle-track {
    background: #e8e8e8;
  }

  .toggle-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 18px; height: 18px;
    background: var(--muted);
    border-radius: 50%;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s;
  }

  .toggle input:checked ~ .toggle-track ~ .toggle-thumb {
    transform: translateX(20px);
    background: var(--bg);
  }

  .btn-group {
    display: flex;
    gap: 0.5rem;
  }

  button {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem 1.2rem;
    transition: all 0.2s;
    background: var(--surface);
    color: var(--muted);
  }

  button:hover {
    border-color: var(--text);
    color: var(--text);
    background: #222;
  }

  button.active, button:active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  /* Info row */
  .info-row {
    margin-top: 1.5rem;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.5rem;
  }

  .info-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem;
    text-align: center;
    transition: all var(--transition);
  }

  .info-card-hex {
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
    transition: color var(--transition);
  }

  .info-card-rgb {
    font-size: 0.62rem;
    color: var(--muted);
    transition: all var(--transition);
    line-height: 1.5;
  }

  .info-card-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin: 0 auto 6px;
    transition: background-color var(--transition);
  }

  /* Auto rotate indicator */
  .auto-label {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .pulse-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4ade80;
    display: none;
    animation: pulse 1.2s ease infinite;
  }

  .auto-rotate .pulse-dot { display: block; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.6); }
  }

  /* Progress bar */
  .progress-bar {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    margin-top: 1.5rem;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .progress-bar.visible { opacity: 1; }

  .progress-fill {
    height: 100%;
    background: var(--text);
    border-radius: 1px;
    width: 0%;
    transition: width 0.1s linear;
  }

  /* Copied toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: var(--bg);
    padding: 0.6rem 1.4rem;
    border-radius: 999px;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    .swatches { height: 220px; }
    .info-row { grid-template-columns: repeat(5, 1fr); gap: 0.25rem; }
    .info-card { padding: 0.5rem 0.25rem; }
    .info-card-hex { font-size: 0.6rem; }
    .info-card-rgb { font-size: 0.5rem; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Palette<br>Rotator</h1>
    <div class="palette-name">
      Current palette
      <span id="paletteName">—</span>
    </div>
  </header>

  <div class="swatches" id="swatches"></div>

  <div class="controls">
    <div class="toggle-group">
      <label class="toggle">
        <input type="checkbox" id="rgbToggle">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
      Show RGB values
    </div>

    <div class="toggle-group auto-label" id="autoLabel">
      <div class="pulse-dot" id="pulseDot"></div>
      Auto-rotate
      <label class="toggle">
        <input type="checkbox" id="autoToggle">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>

    <div class="btn-group">
      <button id="prevBtn">← Prev</button>
      <button id="nextBtn">Next →</button>
      <button id="shuffleBtn">⇄ Shuffle</button>
    </div>
  </div>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="info-row" id="infoRow"></div>
</div>

<div class="toast" id="toast">Copied!</div>

  { name: "Cassette",           colors: ["#1A1A1A","#282838","#5050A0","#A0A0D0","#E0E0F8"] },
  { name: "VHS",                colors: ["#0A001A","#380060","#CC00AA","#FF44CC","#FFAAEE"] },
  { name: "Rotary Phone",       colors: ["#202010","#484830","#787858","#A8A880","#D8D8B0"] },

  { name: "Melancholy",         colors: ["#1A1A28","#2E3850","#506888","#8098B8","#C0D0E8"] },

let currentIndex = 0;
let showRgb = false;
let autoRotate = false;
let autoTimer = null;
let progressTimer = null;
let progressStart = null;
const AUTO_INTERVAL = 4000;

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return { r, g, b };
}

function getTextColor(hex) {
  const { r, g, b } = hexToRgb(hex);
  const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
  return lum > 0.5 ? '#111' : '#fff';
}

function buildSwatches() {
  const swatches = document.getElementById('swatches');
  swatches.innerHTML = '';
  swatches.style.display = 'grid';
  swatches.style.gridTemplateColumns = `repeat(5, 1fr)`;

  const palette = PALETTES[currentIndex];
  palette.colors.forEach((hex, i) => {
    const { r, g, b } = hexToRgb(hex);
    const div = document.createElement('div');
    div.className = 'swatch';
    div.style.backgroundColor = hex;

    const info = document.createElement('div');
    info.className = 'swatch-info';

    const hexEl = document.createElement('span');
    hexEl.className = 'swatch-hex';
    hexEl.textContent = hex.toUpperCase();

    const rgbEl = document.createElement('span');
    rgbEl.className = 'swatch-rgb';
    rgbEl.textContent = `rgb(${r}, ${g}, ${b})`;
    rgbEl.style.display = showRgb ? 'block' : 'none';

    info.appendChild(hexEl);
    info.appendChild(rgbEl);
    div.appendChild(info);

    div.addEventListener('click', () => copyToClipboard(showRgb ? `rgb(${r}, ${g}, ${b})` : hex.toUpperCase()));

    swatches.appendChild(div);
  });
}

function buildInfoRow() {
  const row = document.getElementById('infoRow');
  row.innerHTML = '';
  const palette = PALETTES[currentIndex];
  palette.colors.forEach(hex => {
    const { r, g, b } = hexToRgb(hex);
    const card = document.createElement('div');
    card.className = 'info-card';

    const dot = document.createElement('div');
    dot.className = 'info-card-dot';
    dot.style.backgroundColor = hex;

    const hexEl = document.createElement('div');
    hexEl.className = 'info-card-hex';
    hexEl.textContent = hex.toUpperCase();
    hexEl.style.color = hex;

    const rgbEl = document.createElement('div');
    rgbEl.className = 'info-card-rgb';
    rgbEl.innerHTML = showRgb ? `${r}<br>${g}<br>${b}` : `&nbsp;`;

    card.appendChild(dot);
    card.appendChild(hexEl);
    card.appendChild(rgbEl);
    card.addEventListener('click', () => copyToClipboard(showRgb ? `rgb(${r}, ${g}, ${b})` : hex.toUpperCase()));
    row.appendChild(card);
  });
}

function updatePaletteName() {
  document.getElementById('paletteName').textContent = PALETTES[currentIndex].name;
}

function render() {
  buildSwatches();
  buildInfoRow();
  updatePaletteName();
}

function goTo(index) {
  currentIndex = ((index % PALETTES.length) + PALETTES.length) % PALETTES.length;
  render();
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).catch(() => {});
  const toast = document.getElementById('toast');
  toast.textContent = `Copied ${text}`;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

// Toggle RGB
document.getElementById('rgbToggle').addEventListener('change', e => {
  showRgb = e.target.checked;
  render();
});

// Prev / Next
document.getElementById('prevBtn').addEventListener('click', () => goTo(currentIndex - 1));
document.getElementById('nextBtn').addEventListener('click', () => goTo(currentIndex + 1));

// Shuffle
document.getElementById('shuffleBtn').addEventListener('click', () => {
  let rand;
  do { rand = Math.floor(Math.random() * PALETTES.length); } while (rand === currentIndex);
  goTo(rand);
});

// Auto rotate
function startProgress() {
  progressStart = performance.now();
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  bar.classList.add('visible');
  fill.style.width = '0%';

  function tick(now) {
    const elapsed = now - progressStart;
    const pct = Math.min((elapsed / AUTO_INTERVAL) * 100, 100);
    fill.style.width = pct + '%';
    if (elapsed < AUTO_INTERVAL) progressTimer = requestAnimationFrame(tick);
  }
  progressTimer = requestAnimationFrame(tick);
}

function stopProgress() {
  cancelAnimationFrame(progressTimer);
  const bar = document.getElementById('progressBar');
  bar.classList.remove('visible');
  document.getElementById('progressFill').style.width = '0%';
}

document.getElementById('autoToggle').addEventListener('change', e => {
  autoRotate = e.target.checked;
  const label = document.getElementById('autoLabel');
  if (autoRotate) {
    label.classList.add('auto-rotate');
    startProgress();
    autoTimer = setInterval(() => {
      goTo(currentIndex + 1);
      stopProgress();
      startProgress();
    }, AUTO_INTERVAL);
  } else {
    label.classList.remove('auto-rotate');
    clearInterval(autoTimer);
    stopProgress();
  }
});

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') goTo(currentIndex - 1);
  if (e.key === 'ArrowRight') goTo(currentIndex + 1);
});

// Init
render();
</script>
